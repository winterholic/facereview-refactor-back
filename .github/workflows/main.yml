name: CI/CD - Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/winterholic/facereview-refactor-back

  # ── 서버 배포 경로 (cicd 계정이 쓰기 가능한 /srv 컨벤션) ──
  DEPLOY_PATH: /srv/facereview

  # ── Infisical (셀프호스팅) ──
  INFISICAL_DOMAIN: https://secrets.winterholic.net
  INFISICAL_PROJECT_ID: d113ce3f-417f-4fee-ba43-bfdfd7ad826e   # winterholic 프로젝트 (공용)
  INFISICAL_ENV: prod
  INFISICAL_PATH: /facereview
  INFISICAL_BIN: infisical           # cicd PATH에 없으면 절대경로로 (예: /home/winterholic/bin/infisical)

jobs:
  test:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Flake8 (syntax/undefined only, non-blocking)
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 app/ common/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

  build:
    name: Build & Push (GHCR)
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (server pull + Infisical)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          INFISICAL_DOMAIN: ${{ env.INFISICAL_DOMAIN }}
          INFISICAL_PROJECT_ID: ${{ env.INFISICAL_PROJECT_ID }}
          INFISICAL_ENV: ${{ env.INFISICAL_ENV }}
          INFISICAL_PATH: ${{ env.INFISICAL_PATH }}
          INFISICAL_BIN: ${{ env.INFISICAL_BIN }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: IMAGE_TAG,GHCR_USER,GHCR_TOKEN,DEPLOY_PATH,INFISICAL_DOMAIN,INFISICAL_PROJECT_ID,INFISICAL_ENV,INFISICAL_PATH,INFISICAL_BIN,INFISICAL_CLIENT_ID,INFISICAL_CLIENT_SECRET
          script: |
            set -eu
            cd "$DEPLOY_PATH"

            echo "🔐 GHCR 로그인..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "🔑 Infisical 인증 (Machine Identity / Universal Auth)..."
            INFISICAL_TOKEN=$("$INFISICAL_BIN" login --method=universal-auth \
              --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" \
              --domain="$INFISICAL_DOMAIN/api" --plain --silent)
            export INFISICAL_TOKEN

            echo "📝 런타임 시크릿 .env 생성 ($INFISICAL_ENV : $INFISICAL_PATH)..."
            umask 077
            "$INFISICAL_BIN" export --token="$INFISICAL_TOKEN" --domain="$INFISICAL_DOMAIN/api" \
              --projectId="$INFISICAL_PROJECT_ID" --env="$INFISICAL_ENV" --path="$INFISICAL_PATH" \
              --format=dotenv > .env

            echo "📦 이미지 pull & 기동 (tag: ${IMAGE_TAG:-latest})..."
            export IMAGE_TAG
            docker compose pull
            docker compose up -d --remove-orphans

            echo "🧹 GHCR 로그아웃 + dangling 이미지 정리..."
            docker logout ghcr.io
            docker image prune -f

            echo "🔍 헬스체크..."
            for i in $(seq 1 30); do
              code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health || echo 000)
              if [ "$code" = "200" ]; then echo "✅ health OK ($code)"; break; fi
              if [ "$i" = "30" ]; then echo "❌ health 실패"; docker compose logs --tail=50 app; exit 1; fi
              sleep 2
            done

            docker compose ps
